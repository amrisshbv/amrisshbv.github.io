<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supercar Database</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Orbitron,sans-serif;
    background:#0a0a0a;
    color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:1000;
}

.navbar h1{
    color:#00c6ff;
}

.search-box{
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* Grid */

.car-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:40px;
}

/* Cards */

.card{
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    overflow:hidden;
    transition:0.4s;
    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px #00c6ff;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h2{
    margin-top:0;
}

.spec{
    color:#00c6ff;
    margin:8px 0;
}

.btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.btn:hover{
    box-shadow:0 0 20px #00c6ff;
}

</style>
</head>

<body>

<div class="navbar">
    <h1>Supercar Database</h1>

    <input type="text"
           id="search"
           class="search-box"
           placeholder="Search cars..."
           onkeyup="searchCars()">
</div>

<div class="car-grid" id="carGrid">

    <!-- BMW -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">
        <div class="card-content">
            <h2>BMW M3</h2>
            <p class="spec">Engine: 3.0L Twin Turbo</p>
            <p class="spec">Horsepower: 503 HP</p>
            <p class="spec">Top Speed: 290 km/h</p>
            <button class="btn">View Details</button>
        </div>
    </div>

    <!-- Lamborghini -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b">
        <div class="card-content">
            <h2>Buggati Chiron</h2>
            <p class="spec">Engine: W16 </p>
            <p class="spec">Horsepower: 1,500 HP</p>
            <p class="spec">Top Speed: 420 km/h</p>
            <button class="btn">View Details</button>
        </div>
    </div>

    <!-- Porsche -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
        <div class="card-content">
            <h2>Porsche 911</h2>
            <p class="spec">Engine: Flat-6 Turbo</p>
            <p class="spec">Horsepower: 473 HP</p>
            <p class="spec">Top Speed: 308 km/h</p>
            <button class="btn">View Details</button>
        </div>
    </div>

</div>

<script>

function searchCars(){

    let input =
        document.getElementById("search")
        .value
        .toLowerCase();

    let cards =
        document.querySelectorAll(".card");

    cards.forEach(card => {

        let title =
            card.querySelector("h2")
            .innerText
            .toLowerCase();

        if(title.includes(input)){
            card.style.display = "block";
        }
        else{
            card.style.display = "none";
        }

    });

}

</script>

</body>
</html>
